##############################################################################
# TravelAccess — STANDALONE mode
#
# Use this docker-compose only when running TravelAccess WITHOUT the shared
# Nginx proxy (e.g. local testing, or the only service on the server).
#
# For production with multiple services on one server, use the Proxy project:
#   C:\Code\Proxy
#
# In standalone mode the app listens on port 443 with its own TLS.
# In proxy mode (PORT=3000) the app listens on HTTP 3000 and Nginx handles TLS.
##############################################################################
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: travelaccess:latest
    container_name: travelaccess-web
    ports:
      - "443:443"
    environment:
      - NODE_ENV=production
      - PORT=443
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_CONNECTION_STRING=${ORACLE_CONNECTION_STRING}
      - USE_CLOUD_DB=${USE_CLOUD_DB}
      - CLOUD_ORACLE_USER=${CLOUD_ORACLE_USER}
      - CLOUD_ORACLE_PASSWORD=${CLOUD_ORACLE_PASSWORD}
      - CLOUD_ORACLE_CONNECTION_STRING=${CLOUD_ORACLE_CONNECTION_STRING}
      - CLOUD_ORACLE_WALLET_DIR=/app/oracle_wallet
      - CLOUD_ORACLE_WALLET_PASSWORD=${CLOUD_ORACLE_WALLET_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://travel-access.ddns.net/api/auth/google/callback
      - NEXT_PUBLIC_BASE_URL=https://travel-access.ddns.net
      - JWT_SECRET=${JWT_SECRET}
      - GEOAPIFY_API_KEY=${GEOAPIFY_API_KEY}
      - GEOCODE_JOB_API_KEY=${GEOCODE_JOB_API_KEY}
      - MERGE_JOB_API_KEY=${MERGE_JOB_API_KEY}
      - DEMO_RESET_JOB_API_KEY=${DEMO_RESET_JOB_API_KEY}
      - INTERNAL_TRACK_SECRET=${INTERNAL_TRACK_SECRET}
      - INTERNAL_TRACK_URL=${INTERNAL_TRACK_URL}
    volumes:
      - ./certificates/Cloud:/app/certs:ro
      - ./oracle_wallet:/app/oracle_wallet:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost:443" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
