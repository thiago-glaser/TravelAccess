services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: travelaccess:latest
    container_name: travelaccess-web
    ports:
      - "443:443"
    environment:
      - NODE_ENV=production
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_CONNECTION_STRING=${ORACLE_CONNECTION_STRING}
      - USE_CLOUD_DB=${USE_CLOUD_DB}
      - CLOUD_ORACLE_USER=${CLOUD_ORACLE_USER}
      - CLOUD_ORACLE_PASSWORD=${CLOUD_ORACLE_PASSWORD}
      - CLOUD_ORACLE_CONNECTION_STRING=${CLOUD_ORACLE_CONNECTION_STRING}
      - CLOUD_ORACLE_WALLET_DIR=/app/oracle_wallet
      - CLOUD_ORACLE_WALLET_PASSWORD=${CLOUD_ORACLE_WALLET_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://travel-access.ddns.net/api/auth/google/callback
      - NEXT_PUBLIC_BASE_URL=https://travel-access.ddns.net
      - JWT_SECRET=${JWT_SECRET}
      - GEOAPIFY_API_KEY=${GEOAPIFY_API_KEY}
    volumes:
      - ./certificates/Cloud:/app/certs:ro
      - ./oracle_wallet:/app/oracle_wallet:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost:443" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
